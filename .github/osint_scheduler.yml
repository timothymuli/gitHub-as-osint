name: OSINT Data Collector
on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  collect_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to save data back to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name "Automated Collector"
          git config user.email "actions@github.com"
          git add data_log.txt
          git commit -m "Automated data update" || exit 0
          git push

